services:
  new-api:
    image: ${NEW_API_IMAGE}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    networks:
      - zz-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/status | grep -q '\"success\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  zz-internal:
    external: true
