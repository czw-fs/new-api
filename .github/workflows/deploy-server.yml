name: Build and deploy server image

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/work/project/zz/new-api' }}

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: meta
        run: |
          IMAGE_NAME="${IMAGE_NAME,,}"
          IMAGE_TAG="${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          {
            echo "tags<<EOF"
            echo "${IMAGE_TAG}"
            if [ "$GITHUB_REF_NAME" = "${{ github.event.repository.default_branch }}" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == github.event.repository.default_branch
    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Deploy to server
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        shell: bash
        run: |
          set -eu

          missing=0
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is not configured"
              missing=1
            else
              echo "$name is configured"
            fi
          done
          if [ -z "${SERVER_PORT:-}" ]; then
            echo "SERVER_PORT is not configured; defaulting to 22"
          else
            echo "SERVER_PORT is configured"
          fi
          [ "$missing" -eq 0 ] || exit 1

          port="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" | perl -pe 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh_base=(
            -i ~/.ssh/deploy_key
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=15
          )

          remote_path=$(printf '%q' "$DEPLOY_PATH")
          ssh "${ssh_base[@]}" -p "$port" "$SERVER_USER@$SERVER_HOST" "mkdir -p $remote_path"
          scp "${ssh_base[@]}" -P "$port" deploy/docker-compose.yml "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/docker-compose.yml"

          remote_env="DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH") IMAGE_TAG=$(printf '%q' "$IMAGE_TAG") GHCR_USERNAME=$(printf '%q' "${GHCR_USERNAME:-}") GHCR_TOKEN=$(printf '%q' "${GHCR_TOKEN:-}")"
          ssh "${ssh_base[@]}" -p "$port" "$SERVER_USER@$SERVER_HOST" "$remote_env bash -s" <<'REMOTE_SCRIPT'
            set -eu
            cd "$DEPLOY_PATH"
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            test -f .env
            grep -q '^NEW_API_IMAGE=' .env && \
              sed -i "s|^NEW_API_IMAGE=.*|NEW_API_IMAGE=$IMAGE_TAG|" .env || \
              printf '\nNEW_API_IMAGE=%s\n' "$IMAGE_TAG" >> .env
            for attempt in 1 2 3 4 5; do
              if docker compose pull; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                exit 1
              fi
              sleep $((attempt * 10))
            done
            docker compose up -d
            docker image prune -f
          REMOTE_SCRIPT
